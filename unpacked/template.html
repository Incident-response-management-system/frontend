    /* Shadows — soft, warm */
    --shadow-sm: 0 1px 2px rgba(40, 35, 20, 0.04);
    --shadow: 0 4px 16px rgba(40, 35, 20, 0.06);
    --shadow-lg: 0 12px 36px rgba(40, 35, 20, 0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: var(--sans); background: var(--ink-900); color: var(--ink-50); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; overflow-x: hidden; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--ink-50); color: var(--ink-900); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ink-500); border-radius: 5px; }
  body.light ::-webkit-scrollbar-thumb { background: var(--paper-200); }

  #root { min-height: 100vh; }

  /* Leaflet — light tiles everywhere, no filter */
  .leaflet-container { background: var(--ink-700) !important; font-family: var(--sans); outline: none; }
  .leaflet-control-attribution { background: rgba(255, 255, 255, 0.85) !important; color: var(--ink-300) !important; font-size: 10px !important; border: 1px solid var(--ink-600) !important; }
  .leaflet-control-zoom a { background: white !important; color: var(--ink-50) !important; border-color: var(--ink-600) !important; }

  /* Custom map markers */
  .irms-marker {
    width: 28px; height: 28px; border-radius: 50%; border: 3px solid white;
    box-shadow: 0 3px 10px rgba(40, 35, 20, 0.25), 0 0 0 1px rgba(40, 35, 20, 0.08);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease;
  }
  .irms-marker:hover { transform: scale(1.15); }
  .irms-marker.received { background: var(--red); }
  .irms-marker.review { background: var(--amber); }
  .irms-marker.assigned { background: var(--blue); }
  .irms-marker.resolved { background: var(--green); }
  .pulse {
    position: absolute; inset: 0; border-radius: 50%; animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 currentColor; opacity: 0.6; }
    100% { box-shadow: 0 0 0 18px transparent; opacity: 0; }
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  body.light { background: var(--paper-50); color: var(--paper-900); }
</style>
</head>
